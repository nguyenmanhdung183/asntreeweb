<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notepad</title>
  <style>
    :root {
      color-scheme: dark;
      color: #e2e8f0;
      background: #111827;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(16,185,129,0.16), transparent 28%),
                  #0f172a;
    }
    .container {
      width: min(1100px, 100%);
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 24px;
      box-shadow: 0 24px 70px rgba(15,23,42,0.35);
      overflow: hidden;
    }
    .header {
      padding: 24px 28px 16px;
      border-bottom: 1px solid rgba(148,163,184,0.12);
    }
    .header h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.04em;
    }
    .header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px 28px;
      background: rgba(148,163,184,0.06);
      border-bottom: 1px solid rgba(148,163,184,0.08);
    }
    .toolbar button {
      border: 1px solid rgba(148,163,184,0.16);
      background: rgba(148,163,184,0.06);
      color: #e2e8f0;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s, transform 0.2s;
    }
    .toolbar button:hover {
      background: rgba(59,130,246,0.14);
      transform: translateY(-1px);
    }
    .toolbar .status {
      margin-left: auto;
      color: #cbd5e1;
      font-size: 0.95rem;
      align-self: center;
    }
    .editor {
      width: 100%;
      min-height: 64vh;
      border: none;
      outline: none;
      resize: vertical;
      padding: 24px;
      background: rgba(15, 23, 42, 0.98);
      color: #e2e8f0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      min-height: 520px;
      position: relative;
      z-index: 1;
      pointer-events: auto;
    }
    .footer {
      padding: 18px 28px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      color: #94a3b8;
      font-size: 0.93rem;
    }
    .footer strong { color: #f8fafc; }
    .message { color: #38bdf8; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Notepad</h1>
      <p>Ghi nhanh nội dung cơ bản. Nội dung tự động lưu trong trình duyệt. Mở lại trang này bằng <strong>/notepad</strong>.</p>
    </div>
    <div class="toolbar">
      <button id="clearButton" type="button">Xóa</button>
      <button id="downloadButton" type="button">Tải xuống</button>
      <div class="status" id="saveStatus">Đang tải...</div>
    </div>
    <textarea id="editor" class="editor" placeholder="Gõ ghi chú ở đây..." spellcheck="false" autofocus></textarea>
    <div class="footer">
      <span class="message">Nội dung được lưu tự động trong trình duyệt.</span>
      <span>Chỉ cần ghi cơ bản, không có chức năng phức tạp.</span>
    </div>
  </div>
  <script>
    const STORAGE_KEY = 'asn_notepad_content'
    const editor = document.getElementById('editor')
    const status = document.getElementById('saveStatus')
    const clearButton = document.getElementById('clearButton')
    const downloadButton = document.getElementById('downloadButton')

    function setStatus(text) {
      status.textContent = text
    }

    function loadText() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY)
        if (saved !== null) {
          editor.value = saved
          setStatus('Đã tải nội dung từ bộ nhớ cục bộ')
        } else {
          setStatus('Chưa có nội dung, viết vào ô bên dưới')
        }
      } catch (err) {
        console.error(err)
        setStatus('Không thể đọc bộ nhớ cục bộ')
      }
    }

    function saveText() {
      try {
        localStorage.setItem(STORAGE_KEY, editor.value)
        setStatus('Đã lưu')
      } catch (err) {
        console.error(err)
        setStatus('Lưu thất bại')
      }
    }

    let saveTimer = null
    editor.addEventListener('input', () => {
      setStatus('Đang chờ lưu...')
      if (saveTimer) clearTimeout(saveTimer)
      saveTimer = setTimeout(saveText, 600)
    })

    clearButton.addEventListener('click', () => {
      if (!confirm('Xóa toàn bộ nội dung?')) return
      editor.value = ''
      localStorage.removeItem(STORAGE_KEY)
      setStatus('Đã xóa nội dung')
    })

    downloadButton.addEventListener('click', () => {
      const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url
      a.download = 'notepad.txt'
      document.body.appendChild(a)
      a.click()
      a.remove()
      URL.revokeObjectURL(url)
      setStatus('Đã tải xuống notepad.txt')
    })

    loadText()
    window.addEventListener('load', () => {
      if (editor && document.activeElement !== editor) {
        editor.focus()
      }
    })
  </script>
</body>
</html>
